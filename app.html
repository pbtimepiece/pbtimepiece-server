
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PBTimePiece</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1C1A17;--surface:#242019;--surface-raised:#2C2620;--brass:#B8935B;--brass-bright:#D9B57E;--steel:#7C8B94;--text:#EAE3D3;--text-dim:#9C917E;--rust:#C1553D;--green:#8AA37F;--border:#3A342C;--border-light:#463F35;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;} .display{font-family:'Fraunces',serif;}
  #app{display:flex;min-height:100vh;}
  .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:28px 0;display:flex;flex-direction:column;}
  .brand{padding:0 24px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .brand-mark{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--brass-bright);letter-spacing:.5px;}
  .brand-sub{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
  .nav-item{padding:11px 24px;font-size:14px;color:var(--text-dim);cursor:pointer;border-left:2px solid transparent;display:flex;align-items:center;gap:10px;transition:all .15s;}
  .nav-item:hover{color:var(--text);background:rgba(184,147,91,.06);}
  .nav-item.active{color:var(--brass-bright);border-left-color:var(--brass);background:rgba(184,147,91,.08);}
  .nav-badge{margin-left:auto;background:var(--rust);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;font-family:'JetBrains Mono',monospace;}
  .save-status{padding:8px 24px;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
  .save-status.saving{color:var(--brass);} .save-status.saved{color:var(--green);} .save-status.error{color:var(--rust);}
  main{flex:1;padding:36px 44px;max-width:1200px;}
  .page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:600;margin:0 0 4px;}
  .page-sub{color:var(--text-dim);font-size:14px;margin:0 0 28px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px 20px;}
  .stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--brass-bright);font-weight:600;}
  .stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-top:4px;}
  .stat-card.alert .stat-num{color:var(--rust);}
  .stat-card.good .stat-num{color:var(--green);}
  h3.section-head{font-family:'Fraunces',serif;font-size:16px;color:var(--brass-bright);margin:0 0 14px;font-weight:500;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);padding:8px 10px;border-bottom:1px solid var(--border-light);font-weight:500;}
  td{padding:10px;border-bottom:1px solid var(--border);font-size:13.5px;}
  tr:last-child td{border-bottom:none;} tr:hover td{background:rgba(255,255,255,.015);}
  .part-num{color:var(--text-dim);font-size:12px;} .qty-low{color:var(--rust);font-weight:600;} .qty-ok{color:var(--green);}
  .profit-pos{color:var(--green);font-weight:600;} .profit-neg{color:var(--rust);font-weight:600;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;border-radius:5px;font-size:13px;font-weight:500;padding:8px 14px;transition:all .15s;}
  .btn-primary{background:var(--brass);color:#1C1A17;} .btn-primary:hover{background:var(--brass-bright);}
  .btn-primary:disabled{background:var(--border-light);color:var(--text-dim);cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border-light);} .btn-ghost:hover{color:var(--text);border-color:var(--brass);}
  .btn-sm{padding:5px 10px;font-size:12px;} .icon-btn{background:transparent;color:var(--text-dim);padding:4px 8px;} .icon-btn:hover{color:var(--brass-bright);}
  input,select,textarea{background:var(--surface-raised);border:1px solid var(--border-light);color:var(--text);padding:8px 10px;border-radius:5px;font-size:13.5px;font-family:'Inter',sans-serif;width:100%;}
  input.mono-input,select.mono-input{font-family:'JetBrains Mono',monospace;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brass);}
  textarea{resize:vertical;min-height:60px;}
  label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);display:block;margin-bottom:5px;}
  .field{margin-bottom:14px;} .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;} .form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;} .search-box{width:240px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{background:var(--surface);border:1px solid var(--border-light);border-radius:8px;padding:26px;width:520px;max-height:88vh;overflow-y:auto;}
  .modal h3{margin-top:0;} .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);}
  .empty-state-title{font-family:'Fraunces',serif;font-size:16px;color:var(--text);margin-bottom:6px;}
  .bom-schema{border:1px dashed var(--border-light);border-radius:6px;padding:16px 18px;margin-top:10px;background:rgba(184,147,91,.02);}
  .bom-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dotted var(--border);}
  .bom-row:last-child{border-bottom:none;}
  .bom-tag{width:22px;height:22px;border-radius:50%;border:1px solid var(--brass);color:var(--brass-bright);font-family:'JetBrains Mono',monospace;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bom-name{flex:1;font-size:13.5px;} .bom-qty{font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:12.5px;}
  .bom-status{font-size:11px;padding:2px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;}
  .bom-status.ok{color:var(--green);background:rgba(138,163,127,.12);} .bom-status.short{color:var(--rust);background:rgba(193,85,61,.12);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface-raised);border:1px solid var(--brass);color:var(--text);padding:12px 18px;border-radius:6px;font-size:13.5px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4);}
  .toast.error{border-color:var(--rust);}
  .cat-tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--steel);background:rgba(124,139,148,.12);padding:2px 7px;border-radius:4px;}
  .drag-handle{cursor:grab;color:var(--border-light);padding:0 8px 0 0;font-size:16px;user-select:none;flex-shrink:0;}
  .drag-handle:hover{color:var(--text-dim);}
  .dragging{opacity:.4;}
  .drag-over{outline:2px dashed var(--brass);outline-offset:2px;}
  tr.dragging td{background:var(--surface-raised);}
  tr.drag-over td{border-top:2px solid var(--brass)!important;}
  .collection-section{margin-bottom:28px;display:grid;gap:0;}
  .collection-header{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--brass);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .model-list{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface);}
  .model-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:default;}
  .model-row:not(:last-child){border-bottom:1px solid var(--border-light);}
  .model-row:hover{background:rgba(255,255,255,.02);}
  .model-info{flex:1;}
  .model-name{font-weight:500;color:var(--text);margin-bottom:4px;font-size:14px;}
  .model-ref{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
  .model-stock{text-align:right;display:flex;flex-direction:column;gap:4px;min-width:120px;}
  .stock-number{font-size:16px;font-weight:600;color:var(--brass-bright);}
  .stock-ratio{color:var(--text-dim);font-weight:400;font-size:11px;}
  .stock-status{font-size:11px;font-weight:500;}
  .stock-status.shortage{color:var(--rust);}
  .stock-status.good{color:var(--green);}
  .model-actions{display:flex;gap:6px;margin-left:16px;}
  .collection-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin-bottom:20px;}
  .collection-card{border:1px solid var(--border);border-radius:6px;padding:28px 20px;text-align:center;cursor:pointer;background:var(--surface);transition:all .15s;}
  .collection-card:hover{background:var(--surface-raised);border-color:var(--brass);transform:translateY(-2px);}
  .collection-card-title{font-weight:600;color:var(--brass-bright);font-size:17px;margin-bottom:12px;}
  .collection-card-count{font-size:13px;color:var(--text-dim);}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API_BASE_URL = 'https://pbtimepiece-server-production.up.railway.app';
let state={components:[],models:[],buildLog:[],salesLog:[],customOrders:[],page:'dashboard',modal:null,toast:null,loaded:false,saveStatus:'saved',componentSearch:'',selectedCollection:null,customName:'',customContact:'',customBOM:[],buildCustom:false,buildStandardMode:false};
let saveTimer=null;
let dragHistory=null;
function saveDragState(){dragHistory=JSON.parse(JSON.stringify(state.components));}
function undoDrag(){if(dragHistory){state.components=dragHistory;dragHistory=null;persist();render();showToast('Drag order undone',false);}}
function scheduleS(){state.saveStatus='saving';renderSaveStatus();clearTimeout(saveTimer);saveTimer=setTimeout(()=>doSave(),600);}
async function doSave(){try{const res=await fetch(API_BASE_URL+'/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({components:state.components,models:state.models,buildLog:state.buildLog,salesLog:state.salesLog,customOrders:state.customOrders})});if(!res.ok)throw new Error('Server error');state.saveStatus='saved';state.lastSaved=new Date();}catch(e){state.saveStatus='error';console.error('Save failed',e);}renderSaveStatus();}
setInterval(()=>{if(state.loaded)doSave();},30000);
function renderSaveStatus(){const el=document.getElementById('save-status');if(!el)return;const labels={saving:'Saving...',saved:'All saved',error:'Save failed!'};el.textContent=labels[state.saveStatus]||'';el.className='save-status '+state.saveStatus;}
async function init(){for(let i=0;i<15;i++){try{const res=await fetch(API_BASE_URL+'/api/data');const data=await res.json();state.components=data.components||[];state.models=data.models||[];state.buildLog=data.buildLog||[];state.salesLog=data.salesLog||[];state.customOrders=data.customOrders||[];ensureComponentPrices();state.loaded=true;render();return;}catch(e){await new Promise(r=>setTimeout(r,500));}}ensureComponentPrices();state.loaded=true;render();}
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='z'){e.preventDefault();undoDrag();}});
function persist(){scheduleS();}
function uid(p){return p+'_'+Math.random().toString(36).slice(2,9);}
function makeDraggable(container,items,onReorder,selector){let dragIdx=null;let scrollInterval=null;let isDragging=false;document.addEventListener('wheel',e=>{if(isDragging){e.preventDefault();container.scrollTop+=-e.deltaY;}},{passive:false});container.querySelectorAll(selector).forEach((el,i)=>{el.setAttribute('draggable','true');el.addEventListener('dragstart',e=>{dragIdx=i;isDragging=true;dragHistory=null;saveDragState();el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});el.addEventListener('dragend',e=>{el.classList.remove('dragging');container.querySelectorAll(selector).forEach(x=>x.classList.remove('drag-over'));clearInterval(scrollInterval);isDragging=false;});el.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';container.querySelectorAll(selector).forEach(x=>x.classList.remove('drag-over'));el.classList.add('drag-over');const rect=container.getBoundingClientRect();const scrollThreshold=50;const scrollSpeed=5;clearInterval(scrollInterval);if(e.clientY<rect.top+scrollThreshold){scrollInterval=setInterval(()=>{container.scrollTop-=scrollSpeed;},16);}else if(e.clientY>rect.bottom-scrollThreshold){scrollInterval=setInterval(()=>{container.scrollTop+=scrollSpeed;},16);}});el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');if(dragIdx===null||dragIdx===i)return;const moved=items.splice(dragIdx,1)[0];items.splice(i,0,moved);dragIdx=null;onReorder();});});}
function componentById(id){return state.components.find(c=>c.id===id);}
function lowStockComponents(){return state.components.filter(c=>(c.currentStock+(c.stockOnOrder||0))<c.goalStock);}
function fmt(n){return'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function salesStats(){const now=new Date();const thisMonth=now.getMonth();const thisYear=now.getFullYear();let mRev=0,mProfit=0,yRev=0,yProfit=0,mCount=0,yCount=0;state.salesLog.forEach(s=>{const d=new Date(s.date);const profit=(s.salePrice||0)-(s.productCost||0);if(d.getFullYear()===thisYear){yRev+=s.salePrice||0;yProfit+=profit;yCount+=1;}if(d.getFullYear()===thisYear&&d.getMonth()===thisMonth){mRev+=s.salePrice||0;mProfit+=profit;mCount+=1;}});return{mRev,mProfit,yRev,yProfit,mCount,yCount};}
function componentInventoryStats(){let totalParts=0;let totalValue=0;let totalGoalParts=0;state.components.forEach(c=>{const count=c.currentStock||0;const value=count*(c.price||0);totalParts+=count;totalValue+=value;totalGoalParts+=(c.goalStock||0);});return{totalParts,totalValue,totalGoalParts};}
function watchInventoryStats(){let totalWatches=0;let totalValue=0;let totalGoal=0;const byCollection={};state.models.forEach(m=>{const count=m.finishedStock||0;const value=count*(m.salePrice||0);totalWatches+=count;totalValue+=value;totalGoal+=(m.goalFinished||0);const col=m.collection||'Uncategorized';if(!byCollection[col]){byCollection[col]={count:0,value:0};}byCollection[col].count+=count;byCollection[col].value+=value;});return{totalWatches,totalValue,totalGoal,byCollection};}
let toastTimer=null;
function showToast(msg,isError){state.toast={msg,isError};render();clearTimeout(toastTimer);toastTimer=setTimeout(()=>{state.toast=null;render();},2800);}
function checkAvailability(model,qty){return model.bom.map(item=>{const c=componentById(item.componentId);const needed=item.qty*qty;const available=c?c.currentStock:0;return{componentId:item.componentId,name:c?c.name:'Unknown',unit:c?c.unit:'',needed,available,ok:available>=needed};});}
function generateSerial(model,avail){const order=['Case','Movement','Bezel','Dial','Hands','Second Hand','GMT Hand','Bracelet'];return order.map(cat=>{const entry=avail.find(a=>{const c=componentById(a.componentId);return c&&c.category===cat;});if(!entry)return'';const comp=componentById(entry.componentId);return comp?comp.partNumber:'';}).join('');}
function buildWatch(modelId,qty){const model=state.models.find(m=>m.id===modelId);if(!model)return;const avail=checkAvailability(model,qty);const short=avail.filter(a=>!a.ok);if(short.length){showToast('Not enough stock: '+short.map(s=>s.name).join(', '),true);return;}avail.forEach(a=>{componentById(a.componentId).currentStock-=a.needed;});model.finishedStock=(model.finishedStock||0)+qty;const serials=[];for(let i=0;i<qty;i++){serials.push(generateSerial(model,avail));}const totalCost=calculateBOMCost(model.bom)*qty;state.buildLog.unshift({id:uid('b'),modelId:model.id,modelName:model.name,quantityBuilt:qty,date:new Date().toISOString(),componentsUsed:avail.map(a=>({componentId:a.componentId,name:a.name,qtyUsed:a.needed})),totalComponentCost:totalCost,serials});persist();showToast('Built '+qty+' x '+model.name+'. Serial: '+serials[0]+(qty>1?' + '+(qty-1)+' more':''),false);render();}
function setPage(p){state.page=p;state.modal=null;if(p!=='models')state.selectedCollection=null;render();}
function render(){const app=document.getElementById('app');if(!state.loaded){app.innerHTML='<div style="padding:60px;color:var(--text-dim);">Loading workshop...</div>';return;}const lowStock=lowStockComponents();const nav=[{key:'dashboard',label:'Dashboard'},{key:'components',label:'Components',badge:lowStock.length},{key:'models',label:'Watch Models'},{key:'build',label:'Build a Watch'},{key:'custom-orders',label:'Custom Orders'},{key:'sales',label:'Record a Sale'},{key:'history',label:'Build History'},{key:'saleslog',label:'Sales Log'}];app.innerHTML='<div class="sidebar"><div class="brand"><div class="brand-mark">PBTimePiece</div><div class="brand-sub">Business Hub</div></div>'+nav.map(n=>'<div class="nav-item '+(state.page===n.key?'active':'')+ '" data-nav="'+n.key+'"><span>'+n.label+'</span>'+(n.badge?'<span class="nav-badge">'+n.badge+'</span>':'')+'</div>').join('')+'<div id="save-status" class="save-status saved">All saved</div></div><main id="main"></main>'+(state.toast?'<div class="toast '+(state.toast.isError?'error':'')+' ">'+state.toast.msg+'</div>':'');document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>setPage(el.dataset.nav)));const main=document.getElementById('main');if(state.page==='dashboard')renderDashboard(main);if(state.page==='components')renderComponents(main);if(state.page==='models')renderModels(main);if(state.page==='build')renderBuild(main);if(state.page==='custom-orders')renderCustomOrders(main);if(state.page==='sales')renderSales(main);if(state.page==='history')renderHistory(main);if(state.page==='saleslog')renderSalesLog(main);const ov=document.getElementById('modal-overlay');if(ov)ov.remove();if(state.modal)renderModal();}
function renderDashboard(main){const lowStock=lowStockComponents();const needsBuild=state.models.filter(m=>(m.finishedStock||0)<(m.goalFinished||0));const ss=salesStats();const ws=watchInventoryStats();const cs=componentInventoryStats();const totalInventoryValue=ws.totalValue+cs.totalValue;main.innerHTML='<h1 class="page-title">Dashboard</h1><p class="page-sub">Your bench, at a glance.</p><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;">This month</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;"><div class="stat-card good"><div class="stat-num">'+fmt(ss.mRev)+'</div><div class="stat-label">Revenue</div></div><div class="stat-card '+(ss.mProfit>=0?'good':'alert')+'"><div class="stat-num">'+fmt(ss.mProfit)+'</div><div class="stat-label">Profit</div></div><div class="stat-card"><div class="stat-num">'+ss.mCount+'</div><div class="stat-label">Watches sold</div></div></div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;">This year</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;"><div class="stat-card good"><div class="stat-num">'+fmt(ss.yRev)+'</div><div class="stat-label">Revenue</div></div><div class="stat-card '+(ss.yProfit>=0?'good':'alert')+'"><div class="stat-num">'+fmt(ss.yProfit)+'</div><div class="stat-label">Profit</div></div><div class="stat-card"><div class="stat-num">'+ss.yCount+'</div><div class="stat-label">Watches sold</div></div></div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;">Tasks</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;"><div class="stat-card '+(needsBuild.length?'alert':'')+'"><div class="stat-num">'+needsBuild.length+'</div><div class="stat-label">Watches to build</div></div><div class="stat-card '+(lowStock.length?'alert':'')+'"><div class="stat-num">'+lowStock.length+'</div><div class="stat-label">Parts to order</div></div></div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;">Inventory</div><div class="card" style="margin-bottom:20px;"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:20px;"><div><div style="font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--brass-bright);margin-bottom:12px;font-weight:600;">Watches in Stock</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:4px;">Total / Goal</div><div class="mono" style="font-size:18px;font-weight:600;color:var(--brass-bright);">'+ws.totalWatches+' / '+ws.totalGoal+'</div></div><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:4px;">Value</div><div class="mono" style="font-size:18px;font-weight:600;color:var(--brass-bright);">'+fmt(ws.totalValue)+'</div></div></div></div><div><div style="font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--brass-bright);margin-bottom:12px;font-weight:600;">Components in Stock</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:4px;">Total / Goal</div><div class="mono" style="font-size:18px;font-weight:600;color:var(--brass-bright);">'+cs.totalParts+' / '+cs.totalGoalParts+'</div></div><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:4px;">Value</div><div class="mono" style="font-size:18px;font-weight:600;color:var(--brass-bright);">'+fmt(cs.totalValue)+'</div></div></div></div></div><div style="border-top:1px solid var(--border-light);padding-top:16px;margin-top:16px;"><div style="font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--green);font-weight:600;margin-bottom:8px;">Combined Inventory</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:4px;">Total Items</div><div class="mono" style="font-size:18px;font-weight:600;color:var(--green);">'+(ws.totalWatches+cs.totalParts)+'</div></div><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:4px;">Total Value</div><div class="mono" style="font-size:18px;font-weight:600;color:var(--green);">'+fmt(totalInventoryValue)+'</div></div></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div class="card"><h3 class="section-head">Watches to build</h3>'+(needsBuild.length===0?'<div class="empty-state"><div class="empty-state-title">All watches in stock</div></div>':'<table><tr><th>Model</th><th>In stock</th><th>Goal</th><th>Need to build</th></tr>'+needsBuild.map(m=>'<tr><td>'+m.name+'</td><td class="mono">'+(m.finishedStock||0)+'</td><td class="mono part-num">'+(m.goalFinished||0)+'</td><td class="mono qty-low">'+((m.goalFinished||0)-(m.finishedStock||0))+'</td></tr>').join('')+'</table>')+'</div><div class="card"><h3 class="section-head">Parts to order</h3>'+(lowStock.length===0?'<div class="empty-state"><div class="empty-state-title">All stocked up</div></div>':'<table><tr><th>Part</th><th>Current</th><th>Goal</th><th>To order</th></tr>'+lowStock.map(c=>{const t=c.goalStock-c.currentStock-(c.stockOnOrder||0);return'<tr><td>'+c.name+'</td><td class="mono">'+c.currentStock+' '+c.unit+'</td><td class="mono part-num">'+c.goalStock+'</td><td class="mono qty-low">'+t+' '+c.unit+'</td></tr>';}).join('')+'</table>')+'</div></div>'+(state.components.length===0?'<div class="card" style="margin-top:20px;"><h3 class="section-head">Get started</h3><p style="color:var(--text-dim);font-size:13.5px;">Add your first components, or load sample data.</p><button class="btn-primary" id="load-sample">Load sample data</button></div>':'');const sb=document.getElementById('load-sample');if(sb)sb.addEventListener('click',loadSampleData);}
function renderComponents(main){const q=(state.componentSearch||'').toLowerCase();const filtered=state.components.filter(c=>c.name.toLowerCase().includes(q)||c.partNumber.toLowerCase().includes(q)||c.category.toLowerCase().includes(q));main.innerHTML='<div class="top-bar"><div><h1 class="page-title" style="margin-bottom:0;">Components</h1><p class="page-sub" style="margin-bottom:0;">Every part on the bench.</p></div><button class="btn-primary" id="add-component">+ Add component</button></div><div class="card"><div class="field search-box"><input placeholder="Search by name, part # or category" id="comp-search" value="'+(state.componentSearch||'')+'"/></div><div id="comp-results">'+(filtered.length===0?'<div class="empty-state"><div class="empty-state-title">No components yet</div></div>':'<table><tr><th></th><th>Name</th><th>Part #</th><th>Category</th><th>Price</th><th>Current</th><th>Goal</th><th>On order</th><th></th></tr>'+filtered.map(c=>{const belowGoal=c.currentStock<c.goalStock;const covered=(c.currentStock+(c.stockOnOrder||0))>=c.goalStock;const cls=belowGoal?(covered?'qty-ok':'qty-low'):'part-num';return'<tr data-id="'+c.id+'"><td><span class="drag-handle">↕</span></td><td>'+c.name+'</td><td class="mono part-num">'+c.partNumber+'</td><td><span class="cat-tag">'+c.category+'</span></td><td class="mono" style="color:var(--brass-bright);font-weight:500;">'+fmt(c.price||0)+'</td><td class="mono">'+c.currentStock+' '+c.unit+'</td><td class="mono part-num">'+c.goalStock+'</td><td class="mono '+cls+'">'+(c.stockOnOrder||'--')+'</td><td style="text-align:right;"><button class="icon-btn btn-sm" data-edit-comp="'+c.id+'">Edit</button> <button class="icon-btn btn-sm" data-del-comp="'+c.id+'" style="color:var(--rust);">Delete</button></td></tr>';}).join('')+'</table>')+'</div></div>';document.getElementById('add-component').addEventListener('click',()=>openComponentModal(null));const searchInput=document.getElementById('comp-search');searchInput.addEventListener('input',e=>{state.componentSearch=e.target.value;updateComponentResults(main);});attachComponentHandlers(main);const tbody=main.querySelector('table');if(tbody){makeDraggable(tbody,state.components,()=>{persist();updateComponentResults(main);},'tr[data-id]');}}
function updateComponentResults(main){const q=(state.componentSearch||'').toLowerCase();const filtered=state.components.filter(c=>c.name.toLowerCase().includes(q)||c.partNumber.toLowerCase().includes(q)||c.category.toLowerCase().includes(q));const resultsDiv=document.getElementById('comp-results');resultsDiv.innerHTML=filtered.length===0?'<div class="empty-state"><div class="empty-state-title">No components yet</div></div>':'<table><tr><th></th><th>Name</th><th>Part #</th><th>Category</th><th>Price</th><th>Current</th><th>Goal</th><th>On order</th><th></th></tr>'+filtered.map(c=>{const belowGoal=c.currentStock<c.goalStock;const covered=(c.currentStock+(c.stockOnOrder||0))>=c.goalStock;const cls=belowGoal?(covered?'qty-ok':'qty-low'):'part-num';return'<tr data-id="'+c.id+'"><td><span class="drag-handle">↕</span></td><td>'+c.name+'</td><td class="mono part-num">'+c.partNumber+'</td><td><span class="cat-tag">'+c.category+'</span></td><td class="mono" style="color:var(--brass-bright);font-weight:500;">'+fmt(c.price||0)+'</td><td class="mono">'+c.currentStock+' '+c.unit+'</td><td class="mono part-num">'+c.goalStock+'</td><td class="mono '+cls+'">'+(c.stockOnOrder||'--')+'</td><td style="text-align:right;"><button class="icon-btn btn-sm" data-edit-comp="'+c.id+'">Edit</button> <button class="icon-btn btn-sm" data-del-comp="'+c.id+'" style="color:var(--rust);">Delete</button></td></tr>';}).join('')+'</table>';attachComponentHandlers(main);const tbody=resultsDiv.querySelector('table');if(tbody){makeDraggable(tbody,state.components,()=>{persist();updateComponentResults(main);},'tr[data-id]');}}
function attachComponentHandlers(main){document.querySelectorAll('tr[data-id]').forEach(row=>{row.addEventListener('dblclick',()=>openComponentModal(row.dataset.id));});document.querySelectorAll('[data-edit-comp]').forEach(b=>b.addEventListener('click',()=>openComponentModal(b.dataset.editComp)));document.querySelectorAll('[data-del-comp]').forEach(b=>b.addEventListener('click',()=>{if(confirm('Delete this component?')){state.components=state.components.filter(c=>c.id!==b.dataset.delComp);persist();render();}}));}
const COLLECTIONS=['Datejust','Nautilus','Divers','GMT','Heritage','Land Dweller','Royal Oak','Daytona',"Women's",'Santos'];
function renderModels(main){const groups={};COLLECTIONS.forEach(c=>groups[c]=[]);state.models.forEach(m=>{const c=m.collection&&COLLECTIONS.includes(m.collection)?m.collection:'Uncategorized';groups[c].push(m);});const colsWithModels=COLLECTIONS.filter(c=>groups[c].length>0);const selectedCol=state.selectedCollection;const inventoryByCol={};let totalInStock=0,totalGoal=0,totalPrice=0;colsWithModels.forEach(col=>{let count=0,value=0,goal=0;groups[col].forEach(m=>{count+=(m.finishedStock||0);goal+=(m.goalFinished||0);value+=(m.finishedStock||0)*(m.salePrice||0);});inventoryByCol[col]={count,value,goal};totalInStock+=count;totalGoal+=goal;totalPrice+=value;});main.innerHTML='<div class="top-bar"><div><h1 class="page-title" style="margin-bottom:0;">Watch Models</h1><p class="page-sub" style="margin-bottom:0;">'+(selectedCol?'Collection: '+selectedCol:'Select a collection')+'</p></div><div style="display:flex;gap:10px;">'+(selectedCol?'<button class="btn-ghost" id="back-collections">← Back</button>':'')+'<button class="btn-primary" id="add-model">+ New model</button></div></div>'+(state.models.length===0?'<div class="card empty-state"><div class="empty-state-title">No watch models yet</div></div>':!selectedCol?'<div class="card" style="margin-bottom:20px;"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;"><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;">Total in Stock</div><div class="mono" style="font-size:24px;font-weight:600;color:var(--brass-bright);">'+totalInStock+'</div></div><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;">Total Goal</div><div class="mono" style="font-size:24px;font-weight:600;color:var(--steel);">'+totalGoal+'</div></div><div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;">Total Value</div><div class="mono" style="font-size:24px;font-weight:600;color:var(--brass-bright);">'+fmt(totalPrice)+'</div></div></div><h3 class="section-head" style="margin-bottom:16px;">By Collection</h3><table style="width:100%;"><tr><th style="text-align:left;padding:8px;">Collection</th><th style="text-align:center;padding:8px;">In Stock</th><th style="text-align:center;padding:8px;">Models</th><th style="text-align:right;padding:8px;">Inventory Value</th></tr>'+colsWithModels.map(col=>'<tr><td style="padding:10px;border-bottom:1px solid var(--border-light);">'+col+'</td><td style="padding:10px;border-bottom:1px solid var(--border-light);text-align:center;"><span class="mono" style="font-weight:600;color:var(--brass-bright);">'+inventoryByCol[col].count+'</span></td><td style="padding:10px;border-bottom:1px solid var(--border-light);text-align:center;"><span class="mono" style="color:var(--text-dim);">'+groups[col].length+'</span></td><td style="padding:10px;border-bottom:1px solid var(--border-light);text-align:right;"><span class="mono" style="font-weight:600;color:var(--brass-bright);">'+fmt(inventoryByCol[col].value)+'</span></td></tr>').join('')+'</table></div><div class="collection-grid">'+colsWithModels.map(col=>'<div class="collection-card" data-collection="'+col+'"><div class="collection-card-title">'+col+'</div><div class="collection-card-count">'+groups[col].length+' model'+(groups[col].length!==1?'s':'')+'</div><div style="font-size:12px;color:var(--brass-bright);margin-top:8px;">'+inventoryByCol[col].count+' in stock</div></div>').join('')+'</div>':'');if(selectedCol){document.getElementById('back-collections').addEventListener('click',()=>{state.selectedCollection=null;render();});}else{document.querySelectorAll('.collection-card').forEach(btn=>{btn.addEventListener('click',()=>{state.selectedCollection=btn.dataset.collection;render();});});}document.getElementById('add-model').addEventListener('click',()=>openModelModal(null));}
function openModelModal(id){const ex=id?state.models.find(m=>m.id===id):null;state.modal={type:'model',id:id||null,draft:ex?{name:ex.name,referenceNumber:ex.referenceNumber,collection:ex.collection||'',finishedStock:ex.finishedStock||0,goalFinished:ex.goalFinished||0,bom:ex.bom.map(r=>({...r}))}:{name:'',referenceNumber:'',collection:'',finishedStock:0,goalFinished:0,bom:[]}};render();}
function renderBuild(main){main.innerHTML='<h1 class="page-title">Build a Watch</h1><p class="page-sub">Pick a model and quantity.</p><div class="card"><div style="display:flex;gap:10px;margin-bottom:20px;"><button class="btn-primary" id="build-standard">Build Standard</button></div><div id="standard-section" style="display:none;">'+(state.models.length===0?'<div class="empty-state"><div class="empty-state-title">No models to build yet</div></div>':'<div><div class="field"><label>Search models</label><input type="text" id="model-search" placeholder="Type to search..." style="width:100%;"/><div id="model-dropdown" style="display:none;position:absolute;width:400px;background:var(--surface-raised);border:1px solid var(--brass);border-radius:5px;max-height:200px;overflow-y:auto;z-index:100;margin-top:4px;"></div></div><div id="selected-model" style="margin-top:16px;"></div></div>')+'</div></div>';const bs=document.getElementById('build-standard');if(bs)bs.addEventListener('click',()=>{state.buildStandardMode=true;render();});if(state.buildStandardMode){document.getElementById('standard-section').style.display='block';const searchInput=document.getElementById('model-search');const dropdown=document.getElementById('model-dropdown');const selectedDiv=document.getElementById('selected-model');const modelId=state.selectedModelForBuild;const qty=state.buildQty||1;const model=state.models.find(m=>m.id===modelId);searchInput.addEventListener('input',e=>{const q=e.target.value.toLowerCase();const filtered=state.models.filter(m=>m.name.toLowerCase().includes(q)||m.referenceNumber.toLowerCase().includes(q));dropdown.innerHTML=filtered.map(m=>'<div data-id="'+m.id+'" style="padding:10px;cursor:pointer;border-bottom:1px solid var(--border-light);" class="model-option"><div style="font-weight:500;">'+m.name+'</div><div style="font-size:11px;color:var(--text-dim);">'+m.referenceNumber+'</div></div>').join('');dropdown.style.display=q.length>0&&filtered.length>0?'block':'none';dropdown.querySelectorAll('.model-option').forEach(opt=>{opt.addEventListener('click',()=>{const id=opt.dataset.id;state.selectedModelForBuild=id;state.buildStandardMode=true;render();});});});if(model){selectedDiv.innerHTML='<h3 class="section-head">'+model.name+'</h3><div class="form-row"><div class="field"><label>Quantity</label><input type="number" min="1" class="mono-input" id="build-qty" value="'+qty+'"/></div></div><h3 class="section-head">Materials required</h3><div class="bom-schema">'+checkAvailability(model,qty).map((a,i)=>'<div class="bom-row"><div class="bom-tag">'+(i+1)+'</div><div class="bom-name">'+a.name+'</div><div class="bom-qty">need '+a.needed+' - have '+a.available+'</div><div class="bom-status '+(a.ok?'ok':'short')+'">'+(a.ok?'OK':'SHORT')+'</div></div>').join('')+'</div><div style="margin-top:18px;text-align:right;"><button class="btn-primary" id="do-build" '+(checkAvailability(model,qty).some(a=>!a.ok)?'disabled':'')+'>Build '+qty+' x '+model.name+'</button></div>';const qi=document.getElementById('build-qty');if(qi)qi.addEventListener('input',e=>{state.buildQty=Math.max(1,parseInt(e.target.value)||1);render();});const db=document.getElementById('do-build');if(db)db.addEventListener('click',()=>buildWatch(modelId,qty));}}}
function renderSales(main){const today=new Date().toISOString().split('T')[0];main.innerHTML='<h1 class="page-title">Record a Sale</h1><p class="page-sub">Log a completed sale.</p>'+(state.models.filter(m=>(m.finishedStock||0)>0).length===0?'<div class="card empty-state"><div class="empty-state-title">No finished watches in stock</div></div>':'<div class="card"><button class="btn-primary" id="open-sale">+ Record a sale</button></div>');const btn=document.getElementById('open-sale');if(btn)btn.addEventListener('click',()=>{state.modal={type:'sale',draft:{modelId:state.models.find(m=>(m.finishedStock||0)>0)?.id||'',qty:1,customerName:'',contactInfo:'',date:today,productCost:'',salePrice:'',paymentMethod:'',customerAcquired:''}};render();});}
function renderHistory(main){main.innerHTML='<h1 class="page-title">Build History</h1><p class="page-sub">Every watch completed.</p><div class="card">'+(state.buildLog.length===0?'<div class="empty-state"><div class="empty-state-title">Nothing built yet</div></div>':'<table><tr><th>Date</th><th>Model</th><th>Qty</th><th>Serial</th><th>Components</th><th>Cost</th><th></th></tr>'+state.buildLog.map(b=>'<tr><td class="mono part-num">'+new Date(b.date).toLocaleString()+'</td><td>'+b.modelName+'</td><td class="mono">'+b.quantityBuilt+'</td><td class="mono part-num" style="font-size:11px;">'+((b.serials&&b.serials[0])?b.serials[0]:'—')+'</td><td style="font-size:12px;">'+b.componentsUsed.map(c=>c.name).join(', ')+'</td><td class="mono">'+fmt(b.totalComponentCost||0)+'</td><td><button class="icon-btn btn-sm" data-del-build="'+b.id+'" style="color:var(--rust);">Undo</button></td></tr>').join('')+'</table>')+'</div>';document.querySelectorAll('[data-del-build]').forEach(btn=>btn.addEventListener('click',()=>{const b=state.buildLog.find(x=>x.id===btn.dataset.delBuild);if(!b)return;if(!confirm('Undo this build?'))return;b.componentsUsed.forEach(u=>{const c=componentById(u.componentId);if(c)c.currentStock+=u.qtyUsed;});const m=state.models.find(x=>x.id===b.modelId);if(m)m.finishedStock=Math.max(0,(m.finishedStock||0)-b.quantityBuilt);state.buildLog=state.buildLog.filter(x=>x.id!==b.id);persist();render();}));}
function renderSalesLog(main){main.innerHTML='<h1 class="page-title">Sales Log</h1><p class="page-sub">Every watch sold.</p><div class="card">'+(state.salesLog.length===0?'<div class="empty-state"><div class="empty-state-title">No sales yet</div></div>':'<table><tr><th>Date</th><th>Model</th><th>Customer</th><th>Price</th><th>Profit</th><th></th></tr>'+state.salesLog.map(s=>{const profit=(s.salePrice||0)-(s.productCost||0);return'<tr><td class="mono part-num">'+new Date(s.date).toLocaleDateString()+'</td><td>'+s.modelName+'</td><td>'+s.customerName+'</td><td class="mono">'+fmt(s.salePrice)+'</td><td class="mono '+(profit>=0?'profit-pos':'profit-neg')+'">'+fmt(profit)+'</td><td><button class="icon-btn btn-sm" data-del-sale="'+s.id+'" style="color:var(--rust);">Delete</button></td></tr>';}).join('')+'</table>')+'</div>';document.querySelectorAll('[data-del-sale]').forEach(btn=>btn.addEventListener('click',()=>{const s=state.salesLog.find(x=>x.id===btn.dataset.delSale);if(!s)return;if(!confirm('Delete this sale?'))return;const m=state.models.find(x=>x.id===s.modelId);if(m)m.finishedStock=(m.finishedStock||0)+(s.qty||1);state.salesLog=state.salesLog.filter(x=>x.id!==s.id);persist();render();}));}

function renderModal(){const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='modal-overlay';if(state.modal.type==='component'){const d=state.modal.draft;overlay.innerHTML='<div class="modal"><h3 class="display">'+(state.modal.id?'Edit':'Add component')+'</h3><div class="field"><label>Name</label><input id="m-name" value="'+d.name+'"/></div><div class="form-row"><div class="field"><label>Part number</label><input class="mono-input" id="m-part" value="'+d.partNumber+'"/></div><div class="field"><label>Category</label><select id="m-cat"><option value="">-- select --</option>'+['Movement','Case','Bezel','Dial','Hands','GMT Hand','Second Hand','Bracelet','Crystal','Crown','Strap','Other'].map(c=>'<option value="'+c+'" '+(d.category===c?'selected':'')+'>'+c+'</option>').join('')+'</select></div></div><div class="form-row"><div class="field"><label>Price</label><input type="number" step="0.01" class="mono-input" id="m-price" value="'+(d.price||0)+'"/></div><div class="field"><label>Unit</label><input id="m-unit" value="'+d.unit+'"/></div></div><div class="form-row3"><div class="field"><label>Current</label><input type="number" class="mono-input" id="m-current" value="'+d.currentStock+'"/></div><div class="field"><label>Goal</label><input type="number" class="mono-input" id="m-goal" value="'+d.goalStock+'"/></div><div class="field"><label>On order</label><input type="number" class="mono-input" id="m-onorder" value="'+d.stockOnOrder+'"/></div></div><div class="modal-actions"><button class="btn-ghost" id="modal-cancel">Cancel</button><button class="btn-primary" id="modal-save">Save</button></div></div>';document.body.appendChild(overlay);document.getElementById('modal-cancel').addEventListener('click',closeModal);document.getElementById('modal-save').addEventListener('click',()=>{const name=document.getElementById('m-name').value.trim();if(!name){showToast('Name required',true);return;}const updated={name,partNumber:document.getElementById('m-part').value.trim(),category:document.getElementById('m-cat').value||'Other',price:parseFloat(document.getElementById('m-price').value)||0,currentStock:parseFloat(document.getElementById('m-current').value)||0,goalStock:parseFloat(document.getElementById('m-goal').value)||0,stockOnOrder:parseFloat(document.getElementById('m-onorder').value)||0,unit:document.getElementById('m-unit').value.trim()||'pc'};if(state.modal.id){Object.assign(componentById(state.modal.id),updated);}else{state.components.push({id:uid('c'),...updated});}persist();state.modal=null;render();});return;}if(state.modal.type==='model'){const d=state.modal.draft;overlay.innerHTML='<div class="modal"><h3 class="display">'+(state.modal.id?'Edit':'New model')+'</h3><div class="form-row"><div class="field"><label>Name</label><input id="mm-name" value="'+d.name+'"/></div><div class="field"><label>Collection</label><select id="mm-collection"><option value="">-- select --</option>'+COLLECTIONS.map(c=>'<option value="'+c+'" '+(d.collection===c?'selected':'')+'>'+c+'</option>').join('')+'</select></div></div><div class="form-row"><div class="field"><label>In stock</label><input type="number" class="mono-input" id="mm-finished" value="'+(d.finishedStock||0)+'"/></div><div class="field"><label>Goal</label><input type="number" class="mono-input" id="mm-goal" value="'+(d.goalFinished||0)+'"/></div></div><div class="form-row"><div class="field"><label>Sale Price</label><input type="number" step="0.01" class="mono-input" id="mm-price" value="'+(d.salePrice||0)+'"/></div></div><div class="modal-actions"><button class="btn-ghost" id="modal-cancel">Cancel</button><button class="btn-primary" id="modal-save">Save</button></div></div>';document.body.appendChild(overlay);document.getElementById('modal-cancel').addEventListener('click',closeModal);document.getElementById('modal-save').addEventListener('click',()=>{const name=document.getElementById('mm-name').value.trim();if(!name){showToast('Name required',true);return;}if(state.modal.id){Object.assign(state.models.find(m=>m.id===state.modal.id),{name,collection:document.getElementById('mm-collection').value,finishedStock:parseInt(document.getElementById('mm-finished').value)||0,goalFinished:parseInt(document.getElementById('mm-goal').value)||0,salePrice:parseFloat(document.getElementById('mm-price').value)||0});}else{state.models.push({id:uid('m'),name,collection:document.getElementById('mm-collection').value,finishedStock:parseInt(document.getElementById('mm-finished').value)||0,goalFinished:parseInt(document.getElementById('mm-goal').value)||0,salePrice:parseFloat(document.getElementById('mm-price').value)||0,bom:[]});}persist();state.modal=null;render();});return;}if(state.modal.type==='sale'){const d=state.modal.draft;const availModels=state.models.filter(m=>(m.finishedStock||0)>0);overlay.innerHTML='<div class="modal"><h3 class="display">Record a sale</h3><div class="form-row"><div class="field" style="position:relative;"><label>Model</label><input type="text" id="s-model-search" autocomplete="off" placeholder="Search models..." style="width:100%;"/><div id="s-model-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface-raised);border:1px solid var(--brass);border-radius:5px;max-height:200px;overflow-y:auto;z-index:200;margin-top:4px;"></div><input type="hidden" id="s-model"/></div><div class="field"><label>Qty</label><input type="number" min="1" class="mono-input" id="s-qty" value="'+d.qty+'"/></div></div><div class="form-row"><div class="field"><label>Date</label><input type="date" id="s-date" value="'+d.date+'"/></div><div class="field"><label>Payment</label><select id="s-payment"><option value="">-- select --</option><option>Cash</option><option>Zelle</option><option>Cash App</option><option>Venmo</option><option>Apple Pay</option><option>PayPal</option></select></div></div><div class="form-row"><div class="field"><label>Cost</label><input type="number" step="0.01" class="mono-input" id="s-cost" value="'+d.productCost+'" readonly style="background:var(--surface);opacity:0.7;cursor:default;"/></div><div class="field"><label>Price</label><input type="number" step="0.01" class="mono-input" id="s-price" value="'+d.salePrice+'"/></div></div><div class="form-row"><div class="field"><label>Customer</label><input id="s-name" value="'+d.customerName+'"/></div><div class="field"><label>Contact</label><input id="s-contact" value="'+d.contactInfo+'"/></div></div><div class="modal-actions"><button class="btn-ghost" id="modal-cancel">Cancel</button><button class="btn-primary" id="modal-save">Record sale</button></div></div>';document.body.appendChild(overlay);const modelSearchInput=document.getElementById('s-model-search');const modelDropdown=document.getElementById('s-model-dropdown');const modelHidden=document.getElementById('s-model');const costInput=document.getElementById('s-cost');modelSearchInput.addEventListener('input',e=>{const q=e.target.value.toLowerCase();if(!q){modelDropdown.style.display='none';return;}const matches=availModels.filter(m=>m.name.toLowerCase().includes(q)||m.referenceNumber.toLowerCase().includes(q));modelDropdown.innerHTML=matches.map(m=>'<div data-model-id="'+m.id+'" style="padding:10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border-light);">'+m.name+' ('+m.finishedStock+' in stock)</div>').join('');modelDropdown.style.display='block';modelDropdown.querySelectorAll('[data-model-id]').forEach(item=>{item.addEventListener('mousedown',e=>{e.preventDefault();const modelId=item.dataset.modelId;const model=state.models.find(m=>m.id===modelId);if(model){modelHidden.value=modelId;modelSearchInput.value=model.name;costInput.value=(model.bom.reduce((t,it)=>{const c=componentById(it.componentId);return t+(c?c.price||0:0)*it.qty;},0)).toFixed(2);document.getElementById('s-price').value=model.salePrice||'';modelDropdown.style.display='none';}});});});modelSearchInput.addEventListener('focus',()=>{if(modelSearchInput.value)modelDropdown.style.display='block';});modelSearchInput.addEventListener('blur',()=>{setTimeout(()=>{modelDropdown.style.display='none';},200);});document.getElementById('modal-cancel').addEventListener('click',closeModal);document.getElementById('modal-save').addEventListener('click',()=>{const modelId=modelHidden.value;if(!modelId){showToast('Select a model',true);return;}const model=state.models.find(m=>m.id===modelId);if(!model){showToast('Select a model',true);return;}const qty=Math.max(1,parseInt(document.getElementById('s-qty').value)||1);if(qty>(model.finishedStock||0)){showToast('Only '+(model.finishedStock||0)+' in stock',true);return;}const date=document.getElementById('s-date').value;if(!date){showToast('Enter date',true);return;}const paymentMethod=document.getElementById('s-payment').value;if(!paymentMethod){showToast('Select payment method',true);return;}const salePrice=parseFloat(document.getElementById('s-price').value)||0;if(!salePrice){showToast('Enter price',true);return;}const customerName=document.getElementById('s-name').value.trim();if(!customerName){showToast('Enter customer name',true);return;}const contactInfo=document.getElementById('s-contact').value.trim();if(!contactInfo){showToast('Enter contact info',true);return;}model.finishedStock=Math.max(0,(model.finishedStock||0)-qty);const bomCost=model.bom.reduce((t,it)=>{const c=componentById(it.componentId);return t+(c?c.price||0:0)*it.qty;},0);state.salesLog.unshift({id:uid('s'),modelId:model.id,modelName:model.name,qty,date,customerName,contactInfo,productCost:bomCost,salePrice,paymentMethod});persist();showToast('Sale recorded! '+qty+' x '+model.name+' sold',false);state.modal=null;render();});return;}document.body.appendChild(overlay);}
